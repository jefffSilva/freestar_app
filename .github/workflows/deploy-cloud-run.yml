name: Deploy Cloud Run

# Prerequisites (GCP): Artifact Registry repo, Cloud Run API, IAM for deployer SA,
# Workload Identity Federation binding GitHub -> deployer SA.
# After Terraform apply (infra/), set GitHub repo Variables below (Repository settings -> Secrets and variables -> Actions -> Variables).

on:
  push:
    branches: [main]
    paths-ignore:
      - "infra/**"
      - ".github/workflows/terraform.yml"
      - ".github/scripts/**"
  workflow_dispatch:

env:
  REGION: ${{ vars.GCP_REGION }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
  AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}
  IMAGE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${image}" .
          docker push "${image}"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"

      # Private Cloud Run: not reachable on the default *.run.app URL from the internet; only
      # Google Cloud HTTP(S) Load Balancing may invoke it (see Terraform load_balancer module).
      # allow-unauthenticated lets the LB forward traffic; direct access remains blocked by ingress.
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --quiet
            --ingress=internal-and-cloud-load-balancing
            --allow-unauthenticated
            ${{ vars.CLOUD_RUN_EXTRA_FLAGS }}
